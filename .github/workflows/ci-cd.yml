name: CI/CD Pipeline - ECS Deployment

on:
push:
branches: ["main"]

env:
AWS_REGION: ${{ secrets.AWS_REGION }}
AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
ECR_REPOSITORY_URI: ${{ secrets.ECR_REPOSITORY_URI }}

jobs:
deploy:
runs-on: ubuntu-latest

steps:
  - name: Checkout Code
    uses: actions/checkout@v3

  - name: Configure AWS Credentials
    uses: aws-actions/configure-aws-credentials@v2
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ env.AWS_REGION }}

  - name: Login to ECR
    run: |
      aws ecr get-login-password --region $AWS_REGION | \
      docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

  - name: Build & Push Backend
    run: |
      docker build -t backend ./backend
      docker tag backend:latest $ECR_REPOSITORY_URI:backend
      docker push $ECR_REPOSITORY_URI:backend

  - name: Build & Push Frontend
    run: |
      docker build -t frontend ./frontend
      docker tag frontend:latest $ECR_REPOSITORY_URI:frontend
      docker push $ECR_REPOSITORY_URI:frontend

  - name: Deploy to ECS
    run: |
      aws ecs update-service \
        --cluster my-ecs-cluster \
        --service backend-service \
        --force-new-deployment

      aws ecs update-service \
        --cluster my-ecs-cluster \
        --service frontend-service \
        --force-new-deployment